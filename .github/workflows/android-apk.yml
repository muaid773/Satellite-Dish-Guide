name: Build Android APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build APK via Capacitor
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js 20 ──────────────────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ── 3. pnpm 9 ──────────────────────────────────────────────────────────
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      # ── 4. Java JDK 17 (required by Gradle / Android build) ───────────────
      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      # ── 5. Install workspace dependencies ─────────────────────────────────
      #   --no-frozen-lockfile: avoids ERR_PNPM_LOCKFILE_CONFIG_MISMATCH
      - name: Install workspace dependencies
        run: pnpm install --no-frozen-lockfile

      # ── 6. Install Capacitor (not in pnpm workspace deps) ─────────────────
      - name: Install Capacitor packages
        working-directory: artifacts/satellite-dish-aligner
        run: |
          pnpm add -D \
            @capacitor/core@6 \
            @capacitor/cli@6 \
            @capacitor/android@6
            
      
      # ── 7. Build web app ───────────────────────────────────────────────────
      #   Uses vite.config.local.ts — no PORT or BASE_PATH required
      #   Output: artifacts/satellite-dish-aligner/dist/
      - name: Build web app
        working-directory: artifacts/satellite-dish-aligner
        run: pnpm run build:local

      # ── 8. Add Android platform (only if android/ doesn't exist) ──────────
      - name: Add Android platform
        working-directory: artifacts/satellite-dish-aligner
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          else
            echo "android/ already exists — skipping cap add"
          fi

      # ── 9. Sync web assets into the Android project ───────────────────────
      - name: Sync Capacitor
        working-directory: artifacts/satellite-dish-aligner
        run: npx cap sync android

      # ── 10. Grant Gradle execute permission ───────────────────────────────
      - name: Make gradlew executable
        working-directory: artifacts/satellite-dish-aligner/android
        run: chmod +x gradlew

      # ── 11. Build debug APK ────────────────────────────────────────────────
      - name: Build debug APK
        working-directory: artifacts/satellite-dish-aligner/android
        run: ./gradlew assembleDebug --no-daemon

      # ── 12. Upload APK as downloadable artifact ────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: satellite-dish-aligner-apk-${{ github.run_number }}
          path: artifacts/satellite-dish-aligner/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30
