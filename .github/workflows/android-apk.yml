name: Build Android APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build APK via Capacitor
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js ─────────────────────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ── 3. pnpm ────────────────────────────────────────────────────────────
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      # ── 4. Java JDK 17 (required by Gradle) ───────────────────────────────
      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      # ── 5. Install workspace dependencies ─────────────────────────────────
      - name: Install workspace dependencies
        run: pnpm install

      # ── 6. Install Capacitor packages (not in workspace deps) ─────────────
      - name: Install Capacitor
        working-directory: artifacts/satellite-dish-aligner
        run: |
          npm install --save-exact \
            @capacitor/core@6 \
            @capacitor/cli@6 \
            @capacitor/android@6

      # ── 7. Build web app ───────────────────────────────────────────────────
      #   PORT and BASE_PATH are required by vite.config.ts
      #   BASE_PATH=/ so Capacitor serves assets from the root
      - name: Build web app
        working-directory: artifacts/satellite-dish-aligner
        env:
          PORT: "3000"
          BASE_PATH: "/"
        run: pnpm --filter @workspace/satellite-dish-aligner build

      # ── 8. Add Android platform (if not committed to repo) ─────────────────
      - name: Add Android platform
        working-directory: artifacts/satellite-dish-aligner
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          else
            echo "android/ already exists — skipping cap add"
          fi

      # ── 9. Sync web assets into the Android project ───────────────────────
      - name: Sync Capacitor
        working-directory: artifacts/satellite-dish-aligner
        run: npx cap sync android

      # ── 10. Grant Gradle execute permission ───────────────────────────────
      - name: Make gradlew executable
        working-directory: artifacts/satellite-dish-aligner/android
        run: chmod +x gradlew

      # ── 11. Build debug APK ────────────────────────────────────────────────
      - name: Build debug APK
        working-directory: artifacts/satellite-dish-aligner/android
        run: ./gradlew assembleDebug --no-daemon

      # ── 12. Upload APK as downloadable artifact ────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: satellite-dish-aligner-apk-${{ github.run_number }}
          path: artifacts/satellite-dish-aligner/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30
