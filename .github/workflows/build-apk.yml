name: Build Android APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK via Capacitor
    runs-on: ubuntu-latest

    steps:
      # ── 1. سحب الكود ────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. إعداد Node.js ─────────────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ── 3. إعداد Java JDK (مطلوب لـ Gradle) ────────────────────────────
      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      # ── 4. إعداد Android SDK ─────────────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools-version: "34.0.0"

      # ── 5. إعداد pnpm ────────────────────────────────────────────────────
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      # ── 6. تثبيت تبعيات الـ workspace ───────────────────────────────────
      - name: Install workspace dependencies
        run: pnpm install

      # ── 7. تثبيت Capacitor داخل مجلد التطبيق ────────────────────────────
      - name: Install Capacitor packages
        working-directory: artifacts/satellite-dish-aligner
        run: |
          npm install --save \
            @capacitor/core@latest \
            @capacitor/cli@latest \
            @capacitor/android@latest

      # ── 8. بناء ملفات الويب (بدون متغيرات Replit) ───────────────────────
      - name: Build web app
        working-directory: artifacts/satellite-dish-aligner
        run: npx vite build --config vite.config.local.ts

      # ── 9. إضافة منصة Android ────────────────────────────────────────────
      - name: Add Android platform
        working-directory: artifacts/satellite-dish-aligner
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          else
            echo "Android platform already exists, skipping..."
          fi

      # ── 10. مزامنة ملفات الويب مع Android ────────────────────────────────
      - name: Sync Capacitor
        working-directory: artifacts/satellite-dish-aligner
        run: npx cap sync android

      # ── 11. منح صلاحيات Gradle ───────────────────────────────────────────
      - name: Make Gradle wrapper executable
        working-directory: artifacts/satellite-dish-aligner/android
        run: chmod +x gradlew

      # ── 12. بناء APK ──────────────────────────────────────────────────────
      - name: Build debug APK
        working-directory: artifacts/satellite-dish-aligner/android
        run: ./gradlew assembleDebug --no-daemon

      # ── 13. رفع الـ APK كـ artifact قابل للتحميل ──────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: satellite-dish-aligner-${{ github.run_number }}
          path: artifacts/satellite-dish-aligner/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── 14. طباعة رابط التحميل ────────────────────────────────────────────
      - name: Print download info
        run: |
          echo "✅ APK جاهز للتحميل!"
          echo "اذهب إلى: Actions → هذا الـ run → Artifacts"
          echo "اسم الملف: satellite-dish-aligner-${{ github.run_number }}"
